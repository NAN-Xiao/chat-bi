# Demo-only compose file.
#
# This stack is for local evaluation and offline demos. It uses the all-in-one
# image defaults, including an in-container PostgreSQL instance, development
# credentials, and direct 8000/8001 exposure.
#
# Do not use this file as production orchestration. For production, follow
# docs/single_tenant_production_readiness.md and provide private environment
# values through deploy/env.production.example plus external PostgreSQL, Redis,
# Nginx, API replicas, and workers.
services:
  shuzhi:
    image: shuzhi:latest
    container_name: shuzhi
    restart: always
    privileged: true
    networks:
      - shuzhi-network
    ports:
      - 8000:8000
      - 8001:8001
    environment:
      # Database configuration
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: shuzhi_bi
      POSTGRES_USER: root
      POSTGRES_PASSWORD: Password123@pg
      # Project basic settings
      PROJECT_NAME: "星通数智"
      DEFAULT_PWD: "elex@123"
      # MCP settings
      MCP_ENABLED: "false"
      SERVER_IMAGE_HOST: http://YOUR_SERVE_IP:MCP_PORT/images/
      # Auth & Security
      SECRET_KEY: y5txe1mRmS_JpOrUzFzHEu-kIQn3lf7ll0AOv9DQh0s
      # CORS settings
      BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:5173,https://localhost,https://localhost:5173"
      # Logging
      LOG_LEVEL: "INFO"
      SQL_DEBUG: False
    volumes:
      - ./data/shuzhi/excel:/opt/shuzhi/data/excel
      - ./data/shuzhi/file:/opt/shuzhi/data/file
      - ./data/shuzhi/images:/opt/shuzhi/images
      - ./data/shuzhi/logs:/opt/shuzhi/app/logs
      - ./data/postgresql:/var/lib/postgresql/data

networks:
  shuzhi-network:

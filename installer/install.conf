# 基础配置
## 安装目录
SHUZHI_BASE=/opt
## 星通数智端口
SHUZHI_WEB_PORT=8000
SHUZHI_MCP_PORT=8001
## 镜像仓库
SHUZHI_IMAGE_REPOSITORY=shuzhi

# 数据库配置
## 是否使用外部数据库
SHUZHI_EXTERNAL_DB=false
## 数据库地址
SHUZHI_DB_HOST=localhost
## 数据库端口 (仅使用外部数据库时才生效)
SHUZHI_DB_PORT=5432
## 星通数智系统数据库库名
SHUZHI_DB_DB=shuzhi_bi
## 数据库用户名
SHUZHI_DB_USER=root
## 数据库密码，密码如包含特殊字符，请用双引号引起来，例如 SHUZHI_DB_PASSWORD="Test@4&^%*^"
SHUZHI_DB_PASSWORD=Password123@pg

# 其他配置
## 普通用户默认密码
SHUZHI_DEFAULT_PWD=elex@123
## 星通数智 Secret Key
SHUZHI_SECRET_KEY=y5txe1mRmS_JpOrUzFzHEu-kIQn3lf7ll0AOv9DQh0s
## Cross-Origin Resource Sharing (CORS) 设置
SHUZHI_CORS_ORIGINS=http://localhost,http://localhost:5173,https://localhost,https://localhost:5173
## 日志级别 DEBUG, INFO, WARNING, ERROR
SHUZHI_LOG_LEVEL="INFO"
## 缓存类型
SHUZHI_CACHE_TYPE="memory"
## Redis 配置。多副本部署时建议将 SHUZHI_CACHE_TYPE 改为 redis。
SHUZHI_REDIS_HOST=127.0.0.1
SHUZHI_REDIS_PORT=6379
SHUZHI_REDIS_DB=0
SHUZHI_REDIS_USERNAME=
SHUZHI_REDIS_PASSWORD=
SHUZHI_REDIS_SSL=false
SHUZHI_REDIS_KEY_PREFIX=shuzhi
## 任务队列配置。worker 使用 Redis 队列，慢任务后续逐步迁入。
SHUZHI_TASK_QUEUE_NAME=default
SHUZHI_TASK_QUEUE_RESULT_TTL_SECONDS=86400
SHUZHI_TASK_QUEUE_POLL_TIMEOUT_SECONDS=5
SHUZHI_TASK_QUEUE_MAX_ATTEMPTS=1
## Embedding 模型配置。默认复用系统默认 AI 模型的 API 地址和 Key，仅模型名固定为 embedding 模型。
SHUZHI_EMBEDDING_MODEL=text-embedding-v4
SHUZHI_EMBEDDING_API_BASE_URL=
SHUZHI_EMBEDDING_API_KEY=
## MCP 工具服务开关。默认关闭；需要启用时改为 true，并同时配置访问控制。
SHUZHI_MCP_ENABLED=false
## MCP 图片存储路径
SHUZHI_SERVER_IMAGE_HOST=http://YOUR_SERVER_IP:MCP_PORT/images/
##Token过期时间: 60 minutes * 24 hours * 8 days = 11520 minutes
SHUZHI_ACCESS_TOKEN_EXPIRE_MINUTES=11520
## 上下文路径
SHUZHI_CONTEXT_PATH=
## 可选安装统计地址，留空则不发送
SHUZHI_INSTALL_LOG_URL=

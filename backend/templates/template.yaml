          如果需要矩形树图，JSON格式应为：
          {{"type":"treemap", "title": "标题", "axis": {{"x": {{"value":"SQL 查询分类列"}}, "y": {{"value":"SQL 查询可累加指标列"}}, "series": {{"value":"SQL 查询上层分类列"}}}}}}
